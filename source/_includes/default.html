<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <style>
      /* normalize */
      @import url("https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.min.css");

      /* import default font */
      @import url("/_assets/styles/MonaspaceNeon.css");

      /* set default font */
      html {
        font-family: "MonaspaceNeon";
        font-feature-settings: "calt", "liga", "ss01", "ss02", "ss03", "ss04",
          "ss05", "ss06", "ss07", "ss08";
        font-variation-settings: "calt" 1, "liga" 1, "ss01" 1, "ss02" 1,
          "ss03" 1, "ss04" 1, "ss05" 1, "ss06" 1, "ss07" 1, "ss08" 1;
        text-align: justify;
      }

      /* hide scrollbar */
      ::-webkit-scrollbar {
        display: none;
      }

      /* remove link decoration */
      a {
        text-decoration: none;
      }

      /* change link colours */
      a {
        color: blue;

        &:visited {
          color: red;
        }

        &:hover {
          text-decoration: underline;
        }
      }

      /* contain body */
      body {
        max-width: 420px;
      }

      /* give body some padding */
      body {
        padding: 1rem;
      }

      /* remove margin from first h1 */
      h1:first-child {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    {{ content }}
  </body>
</html>
