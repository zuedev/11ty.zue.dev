<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <style>
      /* normalize */
      @import url("https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.min.css");

      /* import default font */
      @import url("https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap");

      /* set default font */
      html {
        font-family: "Noto Serif";
        text-align: justify;
      }

      /* hide scrollbar */
      ::-webkit-scrollbar {
        display: none;
      }

      /* contain body */
      body {
        padding: 1rem;
        max-width: 666px;
        margin: auto;
      }

      /* ...and extend it */
      body {
        min-height: 100vh;
      }

      /* default background */
      html {
        background-image: url({{ background_image }});
        background-repeat: no-repeat;
        background-size: cover;
        background-attachment: fixed;
        background-position: center;
      }

      /* paper background */
      body {
        background-color: white;
        background-image: url("https://www.tilingtextures.com/wp-content/uploads/2018/11/0068-1-512x512.jpg");
        background-repeat: repeat;
        background-size: 256px;
        box-shadow: 0 0 0 1px black;
      }

      /* center mermaid diagrams */
      .language-mermaid > svg {
        margin: auto;
      }

      /* remove link decoration */
      a {
        text-decoration: none;
      }

      /* change link colours */
      a {
        color: blue;

        &:visited {
          color: red;
        }

        &:hover {
          text-decoration: underline;
        }
      }

      /* remove margin from first h1 */
      h1:first-child {
        margin-top: 0;
      }

      /* style tables */
      table {
        border-collapse: collapse;
        width: 100%;
        text-align: left;

        th,
        td {
          border: 1px solid black;
          padding: 0.5rem;
        }

        th {
          background-color: black;
          color: white;
        }

        tr {
          background-color: white;
        }

        tr:nth-child(even) {
          background-color: #eee;
        }
      }
    </style>
  </head>
  <body>
    {{ content }}
  </body>
  <!-- render mermaid diagrams -->
  <script type="module" src="/_assets/scripts/mermaid.mjs"></script>
</html>
