<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <style>
      /* normalize */
      @import url("https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.min.css");

      /* import default font */
      @import url("https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap");

      /* set default font */
      html {
        font-family: "Noto Serif";
        text-align: justify;
      }

      /* hide scrollbar */
      ::-webkit-scrollbar {
        display: none;
      }

      /* contain body */
      body {
        max-width: 666px;
        margin: auto;
        padding: 1rem;
      }

      /* center mermaid diagrams */
      .language-mermaid > svg {
        margin: auto;
      }

      /* remove link decoration */
      a {
        text-decoration: none;
      }

      /* change link colours */
      a {
        color: blue;

        &:visited {
          color: red;
        }

        &:hover {
          text-decoration: underline;
        }
      }

      /* dark mode */
      @media (prefers-color-scheme: dark) {
        body {
          background-color: black;
          color: white;
        }

        a {
          color: cyan;

          &:visited {
            color: coral;
          }
        }
      }

      /* remove margin from first h1 */
      h1:first-child {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    {{ content }}
  </body>
  <!-- mermaid js stuff -->
  <script type="module" src="/_assets/scripts/mermaid.mjs"></script>
</html>
